services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: n2yo-proxy-backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/config.json:/app/config.json
    environment:
      - BACKEND_PORT=4000
      - N2YO_BASE_URL=https://api.n2yo.com

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: "${VITE_BACKEND_URL:-http://localhost:4000}"
    container_name: n2yo-proxy-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm install --include=dev && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
